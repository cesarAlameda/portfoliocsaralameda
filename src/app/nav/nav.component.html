<nav class="navbar" [class.navbar-scrolled]="isScrolled">
  <div class="container navbar-container">
    <a href="#" class="navbar-logo" (click)="scrollToSection('hero'); $event.preventDefault()">Cesar Alameda Barquillo</a>
    <button class="nav-toggle" (click)="isMenuOpen = !isMenuOpen" aria-label="Toggle menu">
      <span class="hamburger-line" [class.open]="isMenuOpen"></span>
      <span class="hamburger-line" [class.open]="isMenuOpen"></span>
      <span class="hamburger-line" [class.open]="isMenuOpen"></span>
    </button>
    <ul class="navbar-menu" [class.open]="isMenuOpen">
      <li *ngFor="let link of navLinks" class="navbar-item">
        <a 
          [href]="link.href"
          class="navbar-link"
          [class.active]="!link.action && activeSection === link.href.substring(1)"
          (click)="handleNavClick(link, $event)">
          {{ link.label }}
        </a>
      </li>
    </ul>
  </div>
</nav>
<div class="nav-overlay" *ngIf="isMenuOpen" (click)="closeMenu()"></div>
