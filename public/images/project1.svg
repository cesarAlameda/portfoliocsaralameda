<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#0f0f0f"/>
  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#c89b3c" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
  </g>
  <!-- Corner accent -->
  <rect x="40" y="30" width="60" height="2" fill="#c89b3c" opacity="0.4"/>
  <rect x="40" y="30" width="2" height="60" fill="#c89b3c" opacity="0.4"/>
  <rect x="758" y="30" width="2" height="60" fill="#c89b3c" opacity="0.4"/>
  <rect x="700" y="30" width="60" height="2" fill="#c89b3c" opacity="0.4"/>
  <!-- Abstract network / server icon -->
  <g transform="translate(320, 140)" stroke="#c89b3c" fill="none">
    <rect x="0" y="0" width="160" height="100" rx="4" stroke-width="1.5" opacity="0.5"/>
    <rect x="20" y="20" width="40" height="30" rx="2" stroke-width="1" opacity="0.6"/>
    <rect x="70" y="20" width="40" height="30" rx="2" stroke-width="1" opacity="0.6"/>
    <rect x="120" y="20" width="25" height="30" rx="2" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="70" x2="160" y2="70" stroke-width="0.5" opacity="0.3"/>
    <rect x="20" y="75" width="10" height="10" rx="1" fill="#c89b3c" fill-opacity="0.15" stroke-width="0.8"/>
    <rect x="40" y="75" width="10" height="10" rx="1" fill="#c89b3c" fill-opacity="0.15" stroke-width="0.8"/>
    <rect x="60" y="75" width="10" height="10" rx="1" fill="#c89b3c" fill-opacity="0.15" stroke-width="0.8"/>
  </g>
  <!-- Connecting lines -->
  <g stroke="#c89b3c" stroke-width="0.5" opacity="0.2">
    <line x1="320" y1="240" x2="200" y2="320"/>
    <line x1="480" y1="240" x2="600" y2="320"/>
    <line x1="400" y1="240" x2="400" y2="340"/>
  </g>
  <!-- Small data nodes -->
  <circle cx="200" cy="320" r="4" fill="#c89b3c" fill-opacity="0.15" stroke-width="0.8"/>
  <circle cx="600" cy="320" r="4" fill="#c89b3c" fill-opacity="0.15" stroke-width="0.8"/>
  <circle cx="400" cy="340" r="3" fill="#c89b3c" fill-opacity="0.15" stroke-width="0.8"/>
  <!-- Title -->
  <text x="400" y="395" font-family="'Inter', system-ui, sans-serif" font-size="22" fill="#ececec" text-anchor="middle" font-weight="600" letter-spacing="0.02">SSH Connection Service</text>
  <text x="400" y="420" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#8a8a8a" text-anchor="middle" letter-spacing="0.04">C# · WPF · SSH · .NET</text>
</svg>
