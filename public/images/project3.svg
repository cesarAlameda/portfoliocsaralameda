<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#0f0f0f"/>
  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#c89b3c" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
  </g>
  <!-- Corner accent -->
  <rect x="40" y="30" width="60" height="2" fill="#c89b3c" opacity="0.4"/>
  <rect x="40" y="30" width="2" height="60" fill="#c89b3c" opacity="0.4"/>
  <rect x="758" y="30" width="2" height="60" fill="#c89b3c" opacity="0.4"/>
  <rect x="700" y="30" width="60" height="2" fill="#c89b3c" opacity="0.4"/>
  <!-- Game controller abstract -->
  <g transform="translate(340, 145)" fill="none" stroke="#c89b3c">
    <!-- Controller body -->
    <path d="M20,30 Q20,10 50,10 L70,10 Q100,10 100,30 L100,50 Q100,70 70,70 L50,70 Q20,70 20,50 Z" stroke-width="1.5" opacity="0.5"/>
    <!-- D-pad -->
    <rect x="45" y="30" width="4" height="20" rx="1" stroke-width="0.8" opacity="0.4"/>
    <rect x="37" y="38" width="20" height="4" rx="1" stroke-width="0.8" opacity="0.4"/>
    <!-- Buttons -->
    <circle cx="72" cy="32" r="5" stroke-width="0.8" opacity="0.3"/>
    <circle cx="84" cy="38" r="5" stroke-width="0.8" opacity="0.3"/>
    <circle cx="78" cy="50" r="5" stroke-width="0.8" opacity="0.3"/>
    <!-- Dino footprint decoration -->
    <g transform="translate(30, 85)" stroke-width="0.8" opacity="0.25">
      <circle cx="0" cy="0" r="3"/>
      <circle cx="-4" cy="-6" r="2"/>
      <circle cx="0" cy="-8" r="2"/>
      <circle cx="4" cy="-6" r="2"/>
    </g>
    <g transform="translate(80, 85)" stroke-width="0.8" opacity="0.25">
      <circle cx="0" cy="0" r="3"/>
      <circle cx="-4" cy="-6" r="2"/>
      <circle cx="0" cy="-8" r="2"/>
      <circle cx="4" cy="-6" r="2"/>
    </g>
    <!-- Pixel dots decoration -->
    <g fill="#c89b3c" fill-opacity="0.1" stroke="none">
      <rect x="35" y="15" width="3" height="3"/>
      <rect x="50" y="5" width="3" height="3"/>
      <rect x="85" y="15" width="3" height="3"/>
    </g>
  </g>
  <!-- Title -->
  <text x="400" y="375" font-family="'Inter', system-ui, sans-serif" font-size="22" fill="#ececec" text-anchor="middle" font-weight="600" letter-spacing="0.02">DinoInvasion</text>
  <text x="400" y="400" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#8a8a8a" text-anchor="middle" letter-spacing="0.04">Java · Android · Canvas · Juego móvil</text>
</svg>
