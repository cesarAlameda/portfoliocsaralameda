<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#0d0d0b"/>
  <!-- Minimal grid -->
  <g opacity="0.05" stroke="#d4a047" stroke-width="0.4">
    <line x1="0" y1="90" x2="800" y2="90"/><line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/><line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="200" y1="0" x2="200" y2="450"/><line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
  </g>
  <!-- Corner brackets -->
  <path d="M30,28 h30 M30,28 v30" stroke="#d4a047" stroke-width="1.2" fill="none" opacity="0.3"/>
  <path d="M770,28 h-30 M770,28 v30" stroke="#d4a047" stroke-width="1.2" fill="none" opacity="0.3"/>
  <path d="M30,422 h30 M30,422 v-30" stroke="#d4a047" stroke-width="1.2" fill="none" opacity="0.3"/>
  <path d="M770,422 h-30 M770,422 v-30" stroke="#d4a047" stroke-width="1.2" fill="none" opacity="0.3"/>
  <!-- Abstract dino/game icon -->
  <g transform="translate(340, 130)" stroke="#d4a047" fill="none">
    <!-- Gamepad body -->
    <path d="M20,25 Q20,5 55,5 L65,5 Q100,5 100,25 L100,45 Q100,65 65,65 L55,65 Q20,65 20,45 Z" stroke-width="1.2" opacity="0.5"/>
    <!-- D-pad -->
    <rect x="48" y="24" width="4" height="20" rx="1" stroke-width="0.7" opacity="0.35"/>
    <rect x="38" y="32" width="24" height="4" rx="1" stroke-width="0.7" opacity="0.35"/>
    <!-- Buttons -->
    <circle cx="76" cy="26" r="5" stroke-width="0.8" opacity="0.3"/>
    <circle cx="90" cy="34" r="5" stroke-width="0.8" opacity="0.3"/>
    <circle cx="83" cy="48" r="5" stroke-width="0.8" opacity="0.3"/>
    <!-- Pixel decoration -->
    <g fill="#d4a047" fill-opacity="0.08" stroke="none">
      <rect x="35" y="10" width="4" height="4" rx="0.5"/>
      <rect x="55" y="2" width="4" height="4" rx="0.5"/>
      <rect x="85" y="10" width="4" height="4" rx="0.5"/>
    </g>
  </g>
  <!-- Title -->
  <text x="400" y="390" font-family="'Space Grotesk', system-ui, sans-serif" font-size="21" fill="#e8e4dc" text-anchor="middle" font-weight="600" letter-spacing="-0.01em">DinoInvasion</text>
  <text x="400" y="414" font-family="'Space Grotesk', system-ui, sans-serif" font-size="11" fill="#8a867e" text-anchor="middle" letter-spacing="0.02em">Java · Android · Canvas · Juego móvil</text>
</svg>
