<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#0f0f0f"/>
  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#c89b3c" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
  </g>
  <!-- Corner accent -->
  <rect x="40" y="30" width="60" height="2" fill="#c89b3c" opacity="0.4"/>
  <rect x="40" y="30" width="2" height="60" fill="#c89b3c" opacity="0.4"/>
  <rect x="758" y="30" width="2" height="60" fill="#c89b3c" opacity="0.4"/>
  <rect x="700" y="30" width="60" height="2" fill="#c89b3c" opacity="0.4"/>
  <!-- Monitor / IDE abstract -->
  <g transform="translate(325, 110)" fill="none" stroke="#c89b3c">
    <!-- Monitor -->
    <rect x="0" y="0" width="150" height="100" rx="4" stroke-width="1.5" opacity="0.5"/>
    <!-- Screen code lines -->
    <g stroke-width="0.8" opacity="0.3">
      <line x1="15" y1="20" x2="80" y2="20"/>
      <line x1="15" y1="32" x2="100" y2="32"/>
      <line x1="15" y1="44" x2="60" y2="44"/>
      <line x1="15" y1="56" x2="90" y2="56"/>
      <line x1="15" y1="68" x2="45" y2="68"/>
    </g>
    <!-- Accent line in screen -->
    <line x1="14" y1="44" x2="14" y2="44" stroke-width="3" stroke="#c89b3c" opacity="0.4"/>
    <!-- Stand -->
    <rect x="65" y="105" width="20" height="15" stroke-width="1" opacity="0.3"/>
    <path d="M55,125 L95,125" stroke-width="1.5" opacity="0.3"/>
    <!-- Keyboard -->
    <g transform="translate(0, 145)" stroke-width="0.6" opacity="0.2">
      <rect x="20" y="0" width="110" height="30" rx="3"/>
      <rect x="28" y="6" width="14" height="8" rx="1"/>
      <rect x="46" y="6" width="14" height="8" rx="1"/>
      <rect x="64" y="6" width="14" height="8" rx="1"/>
      <rect x="82" y="6" width="14" height="8" rx="1"/>
      <rect x="36" y="18" width="14" height="8" rx="1"/>
      <rect x="54" y="18" width="14" height="8" rx="1"/>
      <rect x="72" y="18" width="14" height="8" rx="1"/>
    </g>
  </g>
  <!-- Floating bracket decorations -->
  <g stroke="#c89b3c" stroke-width="0.5" opacity="0.08">
    <text x="220" y="130" font-family="monospace" font-size="12" fill="#c89b3c">{ }</text>
    <text x="560" y="250" font-family="monospace" font-size="10" fill="#c89b3c">&lt;/&gt;</text>
  </g>
  <!-- Title -->
  <text x="400" y="375" font-family="'Inter', system-ui, sans-serif" font-size="22" fill="#ececec" text-anchor="middle" font-weight="600" letter-spacing="0.02">Mi Portfolio</text>
  <text x="400" y="400" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#8a8a8a" text-anchor="middle" letter-spacing="0.04">Angular · Diseño editorial · Responsive</text>
</svg>
