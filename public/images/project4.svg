      <rect x="26" y="5" width="12" height="6" rx="1"/><rect x="42" y="5" width="12" height="6" rx="1"/>
      <rect x="58" y="5" width="12" height="6" rx="1"/><rect x="74" y="5" width="12" height="6" rx="1"/>
      <rect x="32" y="15" width="12" height="6" rx="1"/><rect x="48" y="15" width="12" height="6" rx="1"/>
      <rect x="64" y="15" width="12" height="6" rx="1"/>
