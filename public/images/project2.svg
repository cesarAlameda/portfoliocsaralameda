<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#0f0f0f"/>
  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#c89b3c" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
  </g>
  <!-- Corner accent -->
  <rect x="40" y="30" width="60" height="2" fill="#c89b3c" opacity="0.4"/>
  <rect x="40" y="30" width="2" height="60" fill="#c89b3c" opacity="0.4"/>
  <rect x="758" y="30" width="2" height="60" fill="#c89b3c" opacity="0.4"/>
  <rect x="700" y="30" width="60" height="2" fill="#c89b3c" opacity="0.4"/>
  <!-- Abstract phone / handshake icon for AgroTrueque -->
  <g transform="translate(330, 140)" fill="none">
    <!-- Phone body -->
    <rect x="5" y="0" width="40" height="80" rx="6" stroke="#c89b3c" stroke-width="1.5" opacity="0.5"/>
    <rect x="11" y="8" width="28" height="50" rx="3" stroke="#c89b3c" stroke-width="0.8" opacity="0.4"/>
    <circle cx="25" cy="68" r="3" stroke="#c89b3c" stroke-width="0.8" opacity="0.4"/>
    <!-- Spray/leaf symbol -->
    <g transform="translate(75, 20)" stroke="#c89b3c">
      <path d="M0,30 Q10,10 30,0" stroke-width="1.2" opacity="0.6"/>
      <path d="M5,35 Q15,15 35,5" stroke-width="1" opacity="0.4"/>
      <path d="M10,40 Q20,20 40,10" stroke-width="0.8" opacity="0.3"/>
      <circle cx="30" cy="0" r="3" fill="#c89b3c" fill-opacity="0.2" stroke-width="0.6"/>
    </g>
    <!-- Arrows indicating exchange -->
    <g stroke="#c89b3c" stroke-width="1" opacity="0.3">
      <path d="M55,50 L70,50" fill="none"/>
      <path d="M67,46 L73,50 L67,54" fill="none" opacity="0.6"/>
      <path d="M5,50 L-10,50" fill="none"/>
      <path d="M-2,46 L-8,50 L-2,54" fill="none" opacity="0.6"/>
    </g>
  </g>
  <!-- Title -->
  <text x="400" y="375" font-family="'Inter', system-ui, sans-serif" font-size="22" fill="#ececec" text-anchor="middle" font-weight="600" letter-spacing="0.02">AgroTrueque</text>
  <text x="400" y="400" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#8a8a8a" text-anchor="middle" letter-spacing="0.04">Java · Android · Intercambio agrícola</text>
</svg>
