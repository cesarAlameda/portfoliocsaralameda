<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#0d0d0b"/>
  <g opacity="0.05" stroke="#d4a047" stroke-width="0.4">
    <line x1="0" y1="90" x2="800" y2="90"/><line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/><line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="200" y1="0" x2="200" y2="450"/><line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
  </g>
  <path d="M30,28 h30 M30,28 v30" stroke="#d4a047" stroke-width="1.2" fill="none" opacity="0.3"/>
  <path d="M770,28 h-30 M770,28 v30" stroke="#d4a047" stroke-width="1.2" fill="none" opacity="0.3"/>
  <path d="M30,422 h30 M30,422 v-30" stroke="#d4a047" stroke-width="1.2" fill="none" opacity="0.3"/>
  <path d="M770,422 h-30 M770,422 v-30" stroke="#d4a047" stroke-width="1.2" fill="none" opacity="0.3"/>
  <!-- Phone + leaf (AgroTrueque) -->
  <g transform="translate(350, 130)" stroke="#d4a047" fill="none">
    <!-- Phone -->
    <rect x="5" y="0" width="36" height="72" rx="5" stroke-width="1.2" opacity="0.5"/>
    <rect x="11" y="6" width="24" height="46" rx="2" stroke-width="0.7" opacity="0.35"/>
    <circle cx="23" cy="62" r="3" stroke-width="0.7" opacity="0.3"/>
    <!-- Leaf / exchange -->
    <g transform="translate(55, 8)">
      <path d="M0,45 Q6,28 28,5" stroke-width="1.2" opacity="0.45"/>
      <path d="M4,48 Q10,32 32,10" stroke-width="0.8" opacity="0.25"/>
      <path d="M8,51 Q14,36 36,14" stroke-width="0.6" opacity="0.15"/>
      <circle cx="28" cy="5" r="3" fill="#d4a047" fill-opacity="0.12" stroke="none"/>
    </g>
    <!-- Exchange arrows -->
    <g stroke-width="0.8" opacity="0.25">
      <path d="M50,44 L63,44" fill="none"/>
      <path d="M60,40 L66,44 L60,48" fill="none"/>
    </g>
  </g>
  <text x="400" y="390" font-family="'Space Grotesk', system-ui, sans-serif" font-size="21" fill="#e8e4dc" text-anchor="middle" font-weight="600" letter-spacing="-0.01em">AgroTrueque</text>
  <text x="400" y="414" font-family="'Space Grotesk', system-ui, sans-serif" font-size="11" fill="#8a867e" text-anchor="middle" letter-spacing="0.02em">Java · Android · Intercambio agrícola</text>
</svg>
